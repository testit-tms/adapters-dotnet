name: Test TMSRunner
run-name: "#${{ github.run_number }} test tms-runner by ${{ github.triggering_actor }}"
on:
  pull_request:
    paths:
      - "Tms.Adapter/**"
      - "Tms.Adapter.Core/**"
      - "Tms.Adapter.XUnit/**"
      - "TmsRunner/**"
      - ".github/**/test-tms-runner.yml"
      - "!**.csproj"
  workflow_dispatch:
env:
  GITHUB_PAT: ${{ secrets.SERVICE_ACCOUNT_TOKEN }}
  PYTHON_VERSION: 3.12
  TEMP_FILE: tmp/output.txt
  TMS_ADAPTER_MODE: 1
  TMS_CERT_VALIDATION: false
  TMS_OVERWRITE_EXPECTED: false
  TMS_PRIVATE_TOKEN: ${{ secrets.TESTIT_PRIVATE_TOKEN }}
  TMS_URL: ${{ secrets.TESTIT_URL }}
jobs:
  test:
    name: ${{ matrix.project_name }} (.NET ${{ matrix.dotnet_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dotnet_version: 8.0.x
            dotnet_framework: net8.0
            configuration_id: MSTEST_CONFIGURATION_ID
            project_id: MSTEST_PROJECT_ID
            project_name: MsTest
          - dotnet_version: 8.0.x
            dotnet_framework: net8.0
            configuration_id: NUNIT_CONFIGURATION_ID
            project_id: NUNIT_PROJECT_ID
            project_name: NUnitTests
          - dotnet_version: 9.0.x
            dotnet_framework: net9.0
            configuration_id: MSTEST_CONFIGURATION_ID
            project_id: MSTEST_PROJECT_ID
            project_name: MsTest
          - dotnet_version: 9.0.x
            dotnet_framework: net9.0
            configuration_id: NUNIT_CONFIGURATION_ID
            project_id: NUNIT_PROJECT_ID
            project_name: NUnitTests
          - dotnet_version: 10.0.x
            dotnet_framework: net10.0
            configuration_id: MSTEST_CONFIGURATION_ID
            project_id: MSTEST_PROJECT_ID
            project_name: MsTest
          - dotnet_version: 10.0.x
            dotnet_framework: net10.0
            configuration_id: NUNIT_CONFIGURATION_ID
            project_id: NUNIT_PROJECT_ID
            project_name: NUnitTests
    env:
      TMS_CONFIGURATION_ID: ${{ secrets[matrix.configuration_id] }}
      TMS_PROJECT_ID: ${{ secrets[matrix.project_id] }}
      TMS_RUNNER: TmsRunner/bin/Release/${{ matrix.dotnet_framework }}/linux-x64/TmsRunner
      TMS_TEST_RUN_NAME: ${{ matrix.project_name }} TestRun
      TEST_ROOT: dotnet-examples/${{ matrix.project_name }}/${{ matrix.project_name }}
      TEST_DLL: ${{ github.workspace }}/dotnet-examples/${{ matrix.project_name }}/${{ matrix.project_name }}/bin/Release/${{ matrix.dotnet_framework }}/${{ matrix.project_name }}.dll
    steps:
      - name: Checkout adapters-dotnet
        uses: actions/checkout@v5
      - name: Checkout api-validator-dotnet
        uses: actions/checkout@v5
        with:
          repository: testit-tms/api-validator-dotnet
          token: ${{ env.GITHUB_PAT }}
          path: api-validator-dotnet
      - name: Checkout dotnet-examples
        uses: actions/checkout@v5
        with:
          repository: testit-tms/dotnet-examples
          path: dotnet-examples
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet_version }}
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Setup environment
        run: |
          set -euo pipefail
          PROJECT_PATH="${{ github.workspace }}/dotnet-examples/${{ matrix.project_name }}/${{ matrix.project_name }}/${{ matrix.project_name }}.csproj"
          echo "PWD=$(pwd)"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE:-}"
          echo "PROJECT_PATH=${PROJECT_PATH}"
          echo "EXPECTED_TEST_ROOT_REL=dotnet-examples/${{ matrix.project_name }}/${{ matrix.project_name }}"
          test -n "${PROJECT_PATH}" || { echo "::error::PROJECT_PATH is empty"; exit 1; }
          test -f "${PROJECT_PATH}" || { echo "::error::PROJECT file missing: ${PROJECT_PATH}"; ls -la "dotnet-examples/${{ matrix.project_name }}" 2>/dev/null || ls -la dotnet-examples || true; exit 1; }
          # На образе может быть активен SDK 10+: «dotnet package remove PKG» без --project ищет .csproj в cwd —
          # тот же текст ошибки про корень adapters-dotnet. Явный --project + fallback для SDK 8/9.
          if dotnet package remove -h >/dev/null 2>&1; then
            dotnet package remove TestIT.Adapter --project "$PROJECT_PATH" || true
          else
            dotnet remove "$PROJECT_PATH" package TestIT.Adapter || true
          fi
          if dotnet reference add -h >/dev/null 2>&1; then
            dotnet reference add Tms.Adapter/Tms.Adapter.csproj --project "$PROJECT_PATH"
          else
            dotnet add "$PROJECT_PATH" reference Tms.Adapter/Tms.Adapter.csproj
          fi
          dotnet build --configuration Release --property WarningLevel=0 dotnet-examples/${{ matrix.project_name }}
          dotnet build --configuration Release --property WarningLevel=0 TmsRunner
          dotnet build --configuration Debug --property WarningLevel=0 api-validator-dotnet
          pip install testit-cli
          DOTNET_EXE="$(command -v dotnet)"
          DOTNET_HOME="$(dirname "$DOTNET_EXE")"
          SDK_VER="$(dotnet --version)"
          VSTEST_PATH="$DOTNET_HOME/sdk/$SDK_VER/vstest.console.dll"
          test -f "$VSTEST_PATH" || { echo "::error::vstest.console.dll не найден: $VSTEST_PATH (dotnet $SDK_VER из $DOTNET_EXE)"; exit 1; }
          echo "VSTEST_CONSOLE=$VSTEST_PATH" >> $GITHUB_ENV
      - name: Create TestRun
        run: |
          testit testrun create --token ${{ env.TMS_PRIVATE_TOKEN }} --output ${{ env.TEMP_FILE }}
          echo "TMS_TEST_RUN_ID=$(<${{ env.TEMP_FILE }})" >> $GITHUB_ENV
      - name: Test
        run: |
          export SYNC_STORAGE_VERSION=$(grep -o 'SyncStorageVersion = "[^"]*"' Tms.Adapter.Core/SyncStorage/SyncStorageRunner.cs | cut -d'"' -f2)
          
          mkdir -p .caches
          wget -O .caches/syncstorage-linux-amd64 \
          "https://github.com/testit-tms/sync-storage-public/releases/download/${SYNC_STORAGE_VERSION}/syncstorage-${SYNC_STORAGE_VERSION}-linux_amd64"
          chmod +x .caches/syncstorage-linux-amd64
          nohup .caches/syncstorage-linux-amd64 --testRunId ${{ env.TMS_TEST_RUN_ID }} --port 49152 \
          --baseURL ${{ env.TMS_URL }} --privateToken ${{ env.TMS_PRIVATE_TOKEN }}  > service.log 2>&1 & 
          
          sleep 1
          
          curl -fsS http://127.0.0.1:49152/health || { echo "::error::sync-storage health не ответил"; cat service.log; exit 1; }

          ${{ env.TMS_RUNNER }} --runner "${{ env.VSTEST_CONSOLE }}" --testassembly "${{ env.TEST_DLL }}" || true
          echo '::notice::Если код vstest≠0 см. предыдущий вывод; при «No master» в service.log главная причина — не регистрируется процесс синхронизации (часто неверный vstest.console.dll).'

          sleep 1

          curl -fsS --max-time 720 "http://127.0.0.1:49152/wait-completion?testRunId=${{ env.TMS_TEST_RUN_ID }}" \
            || { echo "::notice::wait-completion без успешного HTTP (timeout/Empty reply — см. service.log)."; cat service.log; exit 1; }

          cat service.log

      - name: Validate
        run: |
          dotnet test --configuration Debug --no-build --logger:"console;verbosity=detailed" api-validator-dotnet
