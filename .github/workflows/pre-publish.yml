name: Pre-publish

on:
  pull_request

env:
  RUNNER_DIR: ./TmsRunner
  NUGET_DIR: ./nuget

jobs:
  build-pre-publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet_version: ['8.0.x', '9.0.x', '10.0.x']
        project: [
          Tms.Adapter,
          Tms.Adapter.Core,
          Tms.Adapter.XUnit,
          Tms.Adapter.SpecFlowPlugin
        ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet_version }}

      - name: Restore dependencies
        run: dotnet restore ./${{ matrix.project }}

      - name: Build project
        run: |
          dotnet build --configuration Release \
          --no-restore ./${{ matrix.project }}

      - name: Create NuGet package
        run: |
          dotnet pack --configuration Release \
          --no-build --output ${{ env.NUGET_DIR }} \
          ./${{ matrix.project }}

      - name: Save artifacts
        uses: actions/upload-artifact@v6
        with:
          name: NuGet-package-${{ matrix.project }}-${{ matrix.dotnet_version }}
          path: ${{ env.NUGET_DIR }}/*.nupkg
  
  pre-publish:
    runs-on: ubuntu-latest
    needs: [ build-pre-publish ]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: NuGet-package-*
          path: ${{ env.NUGET_DIR }}
          merge-multiple: true
      
      - name: Validate pre-publish
        run: |
          ls -a ${{ env.NUGET_DIR }}

 